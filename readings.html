<!DOCTYPE html>
<html lang="en-US">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="color-scheme" content="dark only">
        <link rel="stylesheet" href="/styles/global.css" type="text/css">
        <link rel="stylesheet" href="/styles/audio.css" type="text/css">
        <title>Readings - Max Sheridan</title>     
        <link rel="icon" sizes="32x32" href="favicon.ico" type="image/x-icon">
        <link rel="icon" sizes="any" href="favicon.svg" type="image/svg+xml">
        <link rel="apple-touch-icon" href="/assets/icons/apple_touch_icon.png" type="image/png">
        <link rel="manifest" href="/manifest.json" type="application/json">
        <link rel="canonical" href="https://maxsheridan.com/readings">
        <meta name="description" content="Live readings, performances, etc.">
        <meta name="thumbnail" content="https://maxsheridan.com/assets/images/share.webp">
        <meta property="og:site_name" content="Max Sheridan">
        <meta property="og:title" content="Max Sheridan">
        <meta property="og:type" content="website">
        <meta property="og:url" content="https://maxsheridan.com">
        <meta property="og:image" content="https://maxsheridan.com/assets/images/share.webp">
        <meta property="og:image:type" content="image/webp">
        <meta property="og:image:width" content="720">
        <meta property="og:image:height" content="720">
    </head>
    <body>
        <header>
            <nav class="bunch-of-buttons">
                <a href="/writing">Writing</a>
                <a href="/news">News</a>
                <a href="/info">Info</a>
                <img id="logo"class="rotate" src="/assets/graphics/logo.svg" alt="Logo" width="22.5px" height="16px" style="filter: invert(100%);">
            </nav>
        </header>
        <main id="readings">
            <div class="stuff" style="max-width: 30rem">
                <h1>Readings, etc.</h1>
                <div class="some-media">
                    <div class="title">
                        <p><span>23 Dec 2016</span>Why?</p>
                    </div>
                    <div class="audio-player">
                        <audio src="assets/audio/why.mp3"></audio>
                        <div class="controls">
                            <button class="play-pause play" aria-label="Play audio">
                                <svg class="icon" viewBox="0 0 30 30">
                                    <polygon points="10,6.9 10,23.1 24,15" fill="currentColor"></polygon>
                                </svg>
                            </button>
                            <div class="progress">
                                <div class="progress-filled"></div>
                                <input
                                    type="range"
                                    value="0"
                                    max="100"
                                    step="0.1"
                                    aria-label="Progress"
                                />
                            </div>
                        </div>
                    </div>
                </div>
                <div class="some-media">
                    <div class="title">
                        <p><span>29 Nov 2018</span>I Knew</p>
                    </div>
                    <div class="audio-player">
                        <audio src="assets/audio/i_knew.mp3"></audio>
                        <div class="controls">
                            <button class="play-pause play" aria-label="Play audio">
                                <svg class="icon" viewBox="0 0 30 30">
                                    <polygon points="10,6.9 10,23.1 24,15" fill="currentColor"></polygon>
                                </svg>
                            </button>
                            <div class="progress">
                                <div class="progress-filled"></div>
                                <input
                                    type="range"
                                    value="0"
                                    max="100"
                                    step="0.1"
                                    aria-label="Progress"
                                />
                            </div>
                        </div>
                    </div>
                </div>
                <div class="some-media">
                    <div class="title">
                        <p><span>21 Mar 2019</span>Press the Button, Kim</p>
                    </div>
                    <div class="audio-player">
                        <audio src="assets/audio/press_the_button_kim.mp3"></audio>
                        <div class="controls">
                            <button class="play-pause play" aria-label="Play audio">
                                <svg class="icon" viewBox="0 0 30 30">
                                    <polygon points="10,6.9 10,23.1 24,15" fill="currentColor"></polygon>
                                </svg>
                            </button>
                            <div class="progress">
                                <div class="progress-filled"></div>
                                <input
                                    type="range"
                                    value="0"
                                    max="100"
                                    step="0.1"
                                    aria-label="Progress"
                                />
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
        <script src="/js/audio.js" defer></script>
        <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "WebPage",
            "name": "Readings",
            "description": "Live readings, performances, etc.",
            "url": "https://maxsheridan.com/readings"
        }
        </script>    
    </body>
</html>
